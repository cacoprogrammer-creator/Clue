<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clue Dealer</title>
<style>
body{font-family:Arial;margin:0;background:#f4ecd8}
.wrap{padding:12px}
.panel{background:#fff;padding:12px;border:2px solid #b9aa8d;border-radius:10px;margin-bottom:10px}
button{padding:8px 10px;margin:4px;border-radius:8px;cursor:pointer}
.hidden{display:none}
.code{font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>Game Builder</h2>
<input id="boardName" placeholder="Game name"><br>
<textarea id="players" placeholder="Players (one per line)"></textarea><br>
<textarea id="suspects" placeholder="Suspects"></textarea><br>
<textarea id="weapons" placeholder="Weapons"></textarea><br>
<textarea id="rooms" placeholder="Rooms"></textarea><br>
<button id="start">Start Game</button>
<div id="link"></div>
</div>

<div class="panel" id="hostPanel">
<h2>Host Panel</h2>
<div id="codes"></div>

<h3>Accusation Checker</h3>
<select id="accSus"></select>
<select id="accWeap"></select>
<select id="accRoom"></select>
<button id="check">Check</button>
<div id="result"></div>

<h3>End Game</h3>
<button id="revealBtn">Reveal Solution</button>
<div id="solution" class="hidden"></div>
</div>

<div class="panel">
<h2>Join Game</h2>
<input id="codeInput" placeholder="Enter code">
<button id="join">Join</button>
<div id="hand"></div>
</div>
</div>

<script>
function parse(t){return t.split('\n').map(x=>x.trim()).filter(Boolean)}
function shuffle(a){return a.sort(()=>Math.random()-0.5)}
function encode(o){return btoa(JSON.stringify(o))}
function decode(s){return JSON.parse(atob(s))}

let game=null

function buildGame(t){
const s=shuffle([...t.suspects])
const w=shuffle([...t.weapons])
const r=shuffle([...t.rooms])
const solution={suspect:s[0],weapon:w[0],room:r[0]}

const deck=shuffle([
...s.slice(1).map(x=>({cat:'suspects',name:x})),
...w.slice(1).map(x=>({cat:'weapons',name:x})),
...r.slice(1).map(x=>({cat:'rooms',name:x}))
])

const players=t.players.map(p=>({name:p,hand:[],code:Math.floor(1000+Math.random()*9000)}))
deck.forEach((c,i)=>players[i%players.length].hand.push(c))

return {...t,players,solution}
}

function fillDropdowns(){
['accSus','accWeap','accRoom'].forEach(id=>{
const el=document.getElementById(id)
el.innerHTML=''
})

game.suspects.forEach(x=>accSus.innerHTML+=`<option>${x}</option>`)
game.weapons.forEach(x=>accWeap.innerHTML+=`<option>${x}</option>`)
game.rooms.forEach(x=>accRoom.innerHTML+=`<option>${x}</option>`)
}

start.onclick=()=>{
const t={
boardName:boardName.value,
players:parse(players.value),
suspects:parse(suspects.value),
weapons:parse(weapons.value),
rooms:parse(rooms.value)
}
if(t.players.length<2)return alert('Need players')

game=buildGame(t)

const url=location.origin+location.pathname+'?g='+encode(game)
link.innerText=url
history.replaceState(null,'','?g='+encode(game))

codes.innerHTML=''
game.players.forEach(p=>{
codes.innerHTML+=`<div>${p.name}: <span class="code">${p.code}</span></div>`
})

fillDropdowns()
}

check.onclick=()=>{
if(!game)return
const correct=
accSus.value===game.solution.suspect &&
accWeap.value===game.solution.weapon &&
accRoom.value===game.solution.room

result.innerText=correct?"Correct — mystery solved":"Incorrect"
}

revealBtn.onclick=()=>{
solution.classList.remove('hidden')
solution.innerText=`Suspect: ${game.solution.suspect}, Weapon: ${game.solution.weapon}, Room: ${game.solution.room}`
}

join.onclick=()=>{
if(!game)return alert('Load game')
const p=game.players.find(x=>String(x.code)===codeInput.value)
if(!p)return alert('Invalid code')
hand.innerText='Your cards: '+p.hand.map(c=>c.name).join(', ')
}

const params=new URLSearchParams(location.search)
if(params.get('g')){
game=decode(params.get('g'))
fillDropdowns()
}
</script>
</body>
</html>
