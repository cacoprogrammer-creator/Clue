<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clue Game</title>
<style>
body{font-family:Arial;background:#f4ecd8;margin:0;padding:10px}
.panel{background:white;padding:10px;border:2px solid #b9aa8d;margin-bottom:10px;border-radius:10px}
button{padding:6px 10px;margin:4px;border-radius:6px}
.hidden{display:none}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #aaa;text-align:center}
.card{font-weight:bold;text-align:left;padding:5px}
</style>
</head>
<body>

<div class="panel">
<h3>Build Game</h3>
<input id="name" placeholder="Game name"><br>
<textarea id="players" placeholder="Players"></textarea><br>
<textarea id="sus" placeholder="Suspects"></textarea><br>
<textarea id="weap" placeholder="Weapons"></textarea><br>
<textarea id="rooms" placeholder="Rooms"></textarea><br>
<button onclick="startGame()">Start Game</button>
<div id="link"></div>
</div>

<div class="panel">
<h3>Host Panel</h3>
<div id="codes"></div>

<h4>Accusation Checker</h4>
<select id="a1"></select>
<select id="a2"></select>
<select id="a3"></select>
<button onclick="checkAcc()">Check</button>
<div id="res"></div>

<button onclick="reveal()">Reveal Solution</button>
<div id="sol" class="hidden"></div>
</div>

<div class="panel">
<h3>Join</h3>
<input id="code">
<button onclick="join()">Join</button>
<div id="playerArea"></div>
</div>

<script>
function p(x){return x.split('\n').map(a=>a.trim()).filter(Boolean)}
function sh(a){return a.sort(()=>Math.random()-0.5)}
function enc(o){return btoa(JSON.stringify(o))}
function dec(s){return JSON.parse(atob(s))}

let game=null, player=null

function startGame(){
let t={
name:name.value,
players:p(players.value),
sus:p(sus.value),
weap:p(weap.value),
rooms:p(rooms.value)
}

let s=sh([...t.sus]), w=sh([...t.weap]), r=sh([...t.rooms])
let sol={sus:s[0],weap:w[0],room:r[0]}

let deck=sh([...s.slice(1),...w.slice(1),...r.slice(1)])
let playersArr=t.players.map(n=>({name:n,hand:[],code:Math.floor(1000+Math.random()*9000)}))

deck.forEach((c,i)=>playersArr[i%playersArr.length].hand.push(c))

game={...t,players:playersArr,solution:sol}

let url=location.origin+location.pathname+'?g='+enc(game)
link.innerText=url
history.replaceState(null,'','?g='+enc(game))

codes.innerHTML=''
playersArr.forEach(p=>codes.innerHTML+=p.name+': '+p.code+'<br>')

fillAcc()
}

function fillAcc(){
a1.innerHTML=a2.innerHTML=a3.innerHTML=''
game.sus.forEach(x=>a1.innerHTML+=`<option>${x}</option>`)
game.weap.forEach(x=>a2.innerHTML+=`<option>${x}</option>`)
game.rooms.forEach(x=>a3.innerHTML+=`<option>${x}</option>`)
}

function checkAcc(){
let ok=a1.value==game.solution.sus && a2.value==game.solution.weap && a3.value==game.solution.room
res.innerText=ok?"Correct":"Incorrect"
}

function reveal(){
sol.classList.remove('hidden')
sol.innerText=game.solution.sus+', '+game.solution.weap+', '+game.solution.room
}

function join(){
let c=code.value
player=game.players.find(x=>String(x.code)==c)
if(!player)return alert('wrong code')
renderPlayer()
}

function renderPlayer(){
playerArea.innerHTML=`<b>${player.name}</b><br>Cards: ${player.hand.join(', ')}`

let table='<table><tr><th>Card</th>'
for(let i=0;i<game.players.length;i++)table+='<th></th>'
table+='</tr>'

function rows(arr){
arr.forEach(n=>{
table+=`<tr><td class='card'>${n}</td>`
for(let i=0;i<game.players.length;i++){
let val=player.hand.includes(n)&&i==0?'✓':''
table+=`<td onclick="mark(this)">${val}</td>`
}
table+='</tr>'
})
}

rows(game.sus)
rows(game.weap)
rows(game.rooms)

table+='</table>'

playerArea.innerHTML+=table
}

function mark(td){
let vals=['','✓','X','•']
let i=vals.indexOf(td.innerText)
td.innerText=vals[(i+1)%4]
}

let params=new URLSearchParams(location.search)
if(params.get('g')){
game=dec(params.get('g'))
fillAcc()
}
</script>
</body>
</html>
